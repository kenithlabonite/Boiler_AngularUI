<div class="auth-header">
    <h1>Create Account</h1>
    <p>Sign Up to Get Started</p>
</div>

<form [formGroup]="form" (ngSubmit)="onSubmit()">
    <div class="row">
        <div class="col-md-4">
            <div class="form-group">
                <div class="input-wrapper">
                    <i>
                        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor"
                            stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                            <path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2" />
                            <circle cx="12" cy="7" r="4" />
                        </svg>
                    </i>
                    <select formControlName="title" class="form-control"
                        [ngClass]="{ 'is-invalid': submitted && f.title.errors }">
                        <option value="">Title</option>
                        <option value="Mr">Mr</option>
                        <option value="Mrs">Mrs</option>
                        <option value="Miss">Miss</option>
                        <option value="Ms">Ms</option>
                    </select>
                </div>
                <div *ngIf="submitted && f.title.errors" class="invalid-feedback">
                    <div *ngIf="f.title.errors.required">Title is required</div>
                </div>
            </div>
        </div>
        <div class="col-md-8">
            <div class="form-group">
                <div class="input-wrapper">
                    <input type="text" formControlName="firstName" class="form-control" placeholder="First Name"
                        [ngClass]="{ 'is-invalid': submitted && f.firstName.errors }" style="padding-left: 20px;" />
                </div>
                <div *ngIf="submitted && f.firstName.errors" class="invalid-feedback">
                    <div *ngIf="f.firstName.errors.required">FirstName is required</div>
                </div>
            </div>
        </div>
    </div>

    <div class="form-group">
        <div class="input-wrapper">
            <input type="text" formControlName="lastName" class="form-control" placeholder="Last Name"
                [ngClass]="{ 'is-invalid': submitted && f.lastName.errors }" style="padding-left: 20px;" />
        </div>
        <div *ngIf="submitted && f.lastName.errors" class="invalid-feedback">
            <div *ngIf="f.lastName.errors.required">LastName is required</div>
        </div>
    </div>

    <div class="form-group">
        <div class="input-wrapper">
            <i>
                <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"
                    stroke-linecap="round" stroke-linejoin="round">
                    <rect width="20" height="16" x="2" y="4" rx="2" />
                    <path d="m22 7-8.97 5.7a1.94 1.94 0 0 1-2.06 0L2 7" />
                </svg>
            </i>
            <input type="text" formControlName="email" class="form-control" placeholder="Email Address"
                [ngClass]="{ 'is-invalid': submitted && f.email.errors }" />
        </div>
        <div *ngIf="submitted && f.email.errors" class="invalid-feedback">
            <div *ngIf="f.email.errors.required">Email is required</div>
            <div *ngIf="f.email.errors.email">Email is invalid</div>
        </div>
    </div>

    <div class="row">
        <div class="col-md-6">
            <div class="form-group">
                <div class="input-wrapper">
                    <i>
                        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor"
                            stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                            <rect width="18" height="11" x="3" y="11" rx="2" ry="2" />
                            <path d="M7 11V7a5 5 0 0 1 10 0v4" />
                        </svg>
                    </i>
                    <input type="password" formControlName="password" class="form-control" placeholder="Password"
                        [ngClass]="{ 'is-invalid': submitted && f.password.errors }" />
                </div>
                <div *ngIf="submitted && f.password.errors" class="invalid-feedback">
                    <div *ngIf="f.password.errors.required">Required</div>
                    <div *ngIf="f.password.errors.minlength">Min 6 chars</div>
                </div>
            </div>
        </div>
        <div class="col-md-6">
            <div class="form-group">
                <div class="input-wrapper">
                    <i>
                        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor"
                            stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                            <rect width="18" height="11" x="3" y="11" rx="2" ry="2" />
                            <path d="M7 11V7a5 5 0 0 1 10 0v4" />
                        </svg>
                    </i>
                    <input type="password" formControlName="confirmPassword" class="form-control" placeholder="Confirm"
                        [ngClass]="{ 'is-invalid': submitted && f.confirmPassword.errors }" />
                </div>
                <div *ngIf="submitted && f.confirmPassword.errors" class="invalid-feedback">
                    <div *ngIf="f.confirmPassword.errors.required">Required</div>
                    <div *ngIf="f.confirmPassword.errors.mustMatch">Match</div>
                </div>
            </div>
        </div>
    </div>

    <div class="form-group mb-4">
        <div class="form-check">
            <input type="checkbox" formControlName="acceptTerms" id="acceptTerms" class="form-check-input"
                [ngClass]="{ 'is-invalid': submitted && f.acceptTerms.errors }" />
            <label for="acceptTerms" class="form-check-label small text-muted">I accept the Terms & Conditions</label>
            <div *ngIf="submitted && f.acceptTerms.errors" class="invalid-feedback">You must accept the terms</div>
        </div>
    </div>

    <button [disabled]="submitting" class="auth-btn-primary">
        <span *ngIf="submitting" class="spinner-border spinner-border-sm me-1"></span>
        Register
    </button>

    <div class="auth-links">
        <span class="text-muted">Already have an account?</span>
        <a routerLink="../login">Login</a>
    </div>
</form>
