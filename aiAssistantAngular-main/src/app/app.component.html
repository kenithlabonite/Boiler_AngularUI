<div class="app-container" [ngClass]="{ 'logged-in': account }">
    <!-- Sidebar -->
    <aside class="sidebar" *ngIf="account && !isAuth">
        <div class="sidebar-header">
            <img src="assets/gsc-gsu-logo-header.png" alt="Dashboard Logo" class="logo-image">
        </div>

        <nav class="nav-group">
            <a routerLink="/" routerLinkActive="active" [routerLinkActiveOptions]="{exact: true}" class="nav-item">
                <i><svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"
                        stroke-linecap="round" stroke-linejoin="round">
                        <path d="m3 9 9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z" />
                        <polyline points="9 22 9 12 15 12 15 22" />
                    </svg></i>
                <span class="nav-text">Home</span>
            </a>
            <a routerLink="/profile" routerLinkActive="active" class="nav-item">
                <i><svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"
                        stroke-linecap="round" stroke-linejoin="round">
                        <path d="M19 21v-2a4 4 0 0 0-4-4H9a4 4 0 0 0-4 4v2" />
                        <circle cx="12" cy="7" r="4" />
                    </svg></i>
                <span class="nav-text">Profile</span>
            </a>
            <a *ngIf="account.role === Role.Admin" routerLink="/admin" routerLinkActive="active" class="nav-item">
                <i><svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"
                        stroke-linecap="round" stroke-linejoin="round">
                        <rect width="18" height="11" x="3" y="11" rx="2" ry="2" />
                        <path d="M7 11V7a5 5 0 0 1 10 0v4" />
                    </svg></i>
                <span class="nav-text">Admin</span>
            </a>
            <a *ngIf="account.role !== Role.Admin" routerLink="/tasks" routerLinkActive="active" class="nav-item">
                <i><svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"
                        stroke-linecap="round" stroke-linejoin="round">
                        <line x1="8" y1="6" x2="21" y2="6" />
                        <line x1="8" y1="12" x2="21" y2="12" />
                        <line x1="8" y1="18" x2="21" y2="18" />
                        <line x1="3" y1="6" x2="3.01" y2="6" />
                        <line x1="3" y1="12" x2="3.01" y2="12" />
                        <line x1="3" y1="18" x2="3.01" y2="18" />
                    </svg></i>
                <span class="nav-text">Tasks</span>
            </a>
        </nav>


    </aside>

    <!-- Main Content -->
    <main class="main-content" [ngClass]="{'full-width': !account, 'auth-page': isAuth}">
        <!-- Top Navbar -->
        <header class="top-navbar" *ngIf="account && !isAuth">
            <div class="navbar-left"></div>
            <div class="navbar-right">
                <button (click)="logout()" class="logout-btn">
                    <i><svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor"
                            stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                            <path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4" />
                            <polyline points="16 17 21 12 16 7" />
                            <line x1="21" y1="12" x2="9" y2="12" />
                        </svg></i>
                    <span class="logout-text">Log out</span>
                </button>
            </div>
        </header>
        <!-- global alert -->
        <alert></alert>

        <!-- subnav router outlet -->
        <router-outlet name="subnav"></router-outlet>

        <!-- main router outlet -->
        <router-outlet></router-outlet>
    </main>
</div>
